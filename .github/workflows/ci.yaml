name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          cache: true
          cache_dependency_path: v2/pnpm-lock.yaml

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright browsers
        run: cd v2 && pnpm install && pnpm exec playwright install --with-deps chromium

      - name: Run tests
        run: make ci

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: v2/playwright-report/
          retention-days: 30

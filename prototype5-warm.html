<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prototype 5: Refined & Warm</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #faf9f7;
    padding: 2rem;
    color: #2c2520;
  }
  h1 { margin-bottom: 0.5rem; font-size: 1.5rem; letter-spacing: -0.02em; }
  .description {
    color: #7a6e62;
    margin-bottom: 1.5rem;
    font-size: 0.9rem;
    max-width: 700px;
    line-height: 1.5;
  }

  .controls-bar {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    background: #f5f0ea;
    padding: 1rem 1.5rem;
    border-radius: 10px;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  .control-group {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .control-group label {
    font-size: 0.8rem;
    font-weight: 600;
    color: #6b5e52;
  }
  .control-separator {
    width: 1px;
    height: 24px;
    background: #d9cfc4;
  }
  .controls-bar button {
    padding: 0.4rem 1rem;
    border: 1px solid #d1c7bb;
    border-radius: 20px;
    background: white;
    cursor: pointer;
    font-size: 0.8rem;
    color: #6b5e52;
    transition: all 0.2s ease;
  }
  .controls-bar button:hover { background: #f0ebe4; border-color: #b8a99a; color: #4a3f35; }

  .card {
    background: white;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(140,120,100,0.08), 0 1px 2px rgba(140,120,100,0.06);
    padding: 1.5rem;
    overflow-x: auto;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.8rem;
  }
  th {
    text-align: right;
    padding: 0.5rem 0.75rem;
    border-bottom: 2px solid #e8e0d6;
    color: #8a7d71;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    white-space: nowrap;
    position: sticky;
    top: 0;
    background: white;
    z-index: 2;
  }
  th:first-child {
    text-align: left;
    position: sticky;
    left: 0;
    z-index: 3;
  }
  td {
    padding: 0.5rem 0.75rem;
    text-align: right;
    border-bottom: 1px solid #f0ebe4;
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }
  td:first-child {
    text-align: left;
    position: sticky;
    left: 0;
    z-index: 1;
  }

  /* Depth-based row styling */
  tr.depth-0 {
    background: #f0ebe4;
    font-weight: 700;
    font-size: 0.85rem;
  }
  tr.depth-0 td { border-bottom: 2px solid #d9cfc4; }
  tr.depth-0 td:first-child { background: #f0ebe4; border-left: 3px solid var(--accent-color, #c47a5a); }

  tr.depth-1 {
    background: #f7f4f0;
    font-weight: 600;
    font-size: 0.8rem;
  }
  tr.depth-1 td { border-bottom: 1px solid #ede6dd; }
  tr.depth-1 td:first-child { background: #f7f4f0; }

  tr.depth-2 {
    background: #fbfaf8;
    font-weight: 400;
    font-size: 0.78rem;
  }
  tr.depth-2 td { border-bottom: 1px solid #f0ebe4; }
  tr.depth-2 td:first-child { background: #fbfaf8; }

  tr.depth-3 {
    background: white;
    font-weight: 400;
    font-size: 0.75rem;
    color: #8a7d71;
  }
  tr.depth-3 td { border-bottom: 1px solid #f5f0ea; }
  tr.depth-3 td:first-child { background: white; }

  /* Clickable parent category cell */
  td.cat-cell-parent {
    cursor: pointer;
    user-select: none;
  }
  td.cat-cell-parent:hover {
    filter: brightness(0.96);
  }

  .cat-content {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .indent { flex-shrink: 0; }

  /* Chevron */
  .chevron {
    display: inline-block;
    transition: transform 0.2s;
    font-size: 0.6rem;
    color: #b8a99a;
    width: 14px;
    text-align: center;
    flex-shrink: 0;
  }
  .chevron.open { transform: rotate(90deg); }
  .no-chevron { display: inline-block; width: 14px; flex-shrink: 0; }

  /* Total row */
  tr.sum-row { background: #2c2520 !important; background-image: linear-gradient(135deg, #2c2520, #3a312b) !important; color: #f0ebe4; font-weight: 700; }
  tr.sum-row td { border-bottom: none; }
  tr.sum-row td:first-child { background: #2c2520; }
</style>
</head>
<body>

<h1>Prototype 5: Refined & Warm</h1>
<p class="description">
  Warm off-white palette with coral-rose and teal-mint heatmap colors.
  Depth-0 rows have unique left-border accent colors per top-level category.
  Pill-shaped buttons, warm tones throughout.
</p>

<div class="controls-bar">
  <div class="control-group">
    <button onclick="collapseOneLevel()">Collapse</button>
    <button onclick="expandOneLevel()">Expand</button>
  </div>
  <div class="control-separator"></div>
  <div class="control-group">
    <button onclick="collapseAllNodes()">Collapse All</button>
    <button onclick="expandAllNodes()">Expand All</button>
  </div>
</div>

<div class="card">
  <table>
    <thead><tr id="header-row"></tr></thead>
    <tbody id="table-body"></tbody>
  </table>
</div>

<script>
const months = ['2023-01', '2023-02', '2023-03', '2023-04', '2023-05', '2023-06'];

// Accent colors for top-level categories
const ACCENT_COLORS = ['#c47a5a', '#7a8c5a', '#8a6a8c', '#5a7a8c'];

const categoryTree = [
  {
    name: 'Reise (Travel)',
    children: [
      {
        name: 'Flyselskap (Airlines)',
        children: [
          { name: 'SAS', amounts: { '2023-01': 3000, '2023-02': 0, '2023-03': 4500, '2023-04': 0, '2023-05': 2000, '2023-06': 6000 } },
          { name: 'Norwegian', amounts: { '2023-01': 1500, '2023-02': 2200, '2023-03': 0, '2023-04': 3100, '2023-05': 0, '2023-06': 1800 } },
        ]
      },
      {
        name: 'Hotell (Hotels)',
        children: [
          { name: 'Scandic', amounts: { '2023-01': 2500, '2023-02': 0, '2023-03': 3200, '2023-04': 0, '2023-05': 2800, '2023-06': 0 } },
          { name: 'Thon Hotels', amounts: { '2023-01': 0, '2023-02': 1800, '2023-03': 0, '2023-04': 2100, '2023-05': 0, '2023-06': 1500 } },
        ]
      },
      { name: 'Leiebil (Car rental)', amounts: { '2023-01': 800, '2023-02': 0, '2023-03': 1200, '2023-04': 0, '2023-05': 950, '2023-06': 0 } },
    ]
  },
  {
    name: 'Mat og drikke (Food & drink)',
    children: [
      { name: 'Dagligvarer (Groceries)', amounts: { '2023-01': 6500, '2023-02': 5800, '2023-03': 7200, '2023-04': 6100, '2023-05': 6800, '2023-06': 7500 } },
      {
        name: 'Restauranter (Restaurants)',
        children: [
          { name: 'Fast food', amounts: { '2023-01': 400, '2023-02': 350, '2023-03': 500, '2023-04': 300, '2023-05': 450, '2023-06': 380 } },
          { name: 'Fine dining', amounts: { '2023-01': 2200, '2023-02': 0, '2023-03': 1800, '2023-04': 2500, '2023-05': 0, '2023-06': 3000 } },
          { name: 'Cafes', amounts: { '2023-01': 600, '2023-02': 550, '2023-03': 700, '2023-04': 500, '2023-05': 650, '2023-06': 580 } },
        ]
      },
      { name: 'Alkohol (Alcohol)', amounts: { '2023-01': 1200, '2023-02': 800, '2023-03': 1500, '2023-04': 900, '2023-05': 1100, '2023-06': 1300 } },
    ]
  },
  {
    name: 'Personlig forbruk (Personal)',
    children: [
      { name: 'Klaer (Clothing)', amounts: { '2023-01': 3200, '2023-02': 1500, '2023-03': 2800, '2023-04': 4100, '2023-05': 1200, '2023-06': 2600 } },
      { name: 'Elektronikk (Electronics)', amounts: { '2023-01': 5500, '2023-02': 0, '2023-03': 800, '2023-04': 0, '2023-05': 12000, '2023-06': 0 } },
      { name: 'Helse (Health)', amounts: { '2023-01': 900, '2023-02': 900, '2023-03': 900, '2023-04': 900, '2023-05': 900, '2023-06': 900 } },
    ]
  },
  {
    name: 'Hus og innbo (Housing)',
    children: [
      { name: 'Forsikring (Insurance)', amounts: { '2023-01': 2000, '2023-02': 2000, '2023-03': 2000, '2023-04': 2000, '2023-05': 2000, '2023-06': 2000 } },
      { name: 'Vedlikehold (Maintenance)', amounts: { '2023-01': 500, '2023-02': 3200, '2023-03': 0, '2023-04': 800, '2023-05': 0, '2023-06': 4500 } },
      { name: 'Mobler (Furniture)', amounts: { '2023-01': 0, '2023-02': 8500, '2023-03': 0, '2023-04': 0, '2023-05': 15000, '2023-06': 0 } },
    ]
  },
];

// --- Init tree: assign node IDs, paths, compute sums ---
let nodeIndex = 0;
function initTree(nodes) {
  nodes.forEach(node => {
    node.nodeId = nodeIndex++;
    if (node.children) {
      initTree(node.children);
      node.amounts = {};
      months.forEach(m => {
        node.amounts[m] = node.children.reduce((s, c) => s + (c.amounts[m] || 0), 0);
      });
    }
    node.sum = months.reduce((s, m) => s + (node.amounts[m] || 0), 0);
    node.avg = Math.round(node.sum / months.length);
  });
}
initTree(categoryTree);

// --- State ---
const expandState = {};

// --- Heatmap: coral-rose / teal-mint ---
const MAX_RED_RATIO = 2.0;
const MAX_GREEN_RATIO = 0.5;
const MAX_RED_COLOR = '#e8836a';
const MAX_GREEN_COLOR = '#5cb8a5';
const NEUTRAL_COLOR = '#ffffff';

function interpolateColor(color1, color2, ratio) {
  const hex1 = color1.replace('#', '');
  const hex2 = color2.replace('#', '');
  const r1 = parseInt(hex1.substr(0, 2), 16);
  const g1 = parseInt(hex1.substr(2, 2), 16);
  const b1 = parseInt(hex1.substr(4, 2), 16);
  const r2 = parseInt(hex2.substr(0, 2), 16);
  const g2 = parseInt(hex2.substr(2, 2), 16);
  const b2 = parseInt(hex2.substr(4, 2), 16);
  const r = Math.round(r1 + (r2 - r1) * ratio);
  const g = Math.round(g1 + (g2 - g1) * ratio);
  const b = Math.round(b1 + (b2 - b1) * ratio);
  return '#' + r.toString(16).padStart(2, '0') + g.toString(16).padStart(2, '0') + b.toString(16).padStart(2, '0');
}

function calculateCellColor(cellValue, average) {
  if (average === 0 || cellValue === 0) return NEUTRAL_COLOR;
  const ratio = cellValue / average;
  if (ratio >= MAX_RED_RATIO) return MAX_RED_COLOR;
  if (ratio <= MAX_GREEN_RATIO) return MAX_GREEN_COLOR;
  if (ratio > 1) {
    const intensity = (ratio - 1) / (MAX_RED_RATIO - 1);
    return interpolateColor(NEUTRAL_COLOR, MAX_RED_COLOR, intensity);
  } else {
    const intensity = (1 - ratio) / (1 - MAX_GREEN_RATIO);
    return interpolateColor(NEUTRAL_COLOR, MAX_GREEN_COLOR, intensity);
  }
}

function formatNum(n) {
  return n === 0 ? '-' : n.toLocaleString('nb-NO');
}

// --- Visibility logic ---
function shouldShowChildren(node) {
  if (!node.children) return false;
  return !!expandState[node.nodeId];
}

function collectVisibleRows(nodes, depth) {
  const rows = [];
  nodes.forEach(node => {
    const hasChildren = node.children && node.children.length > 0;
    const showChildren = hasChildren && shouldShowChildren(node);
    rows.push({ node, depth, hasChildren, showChildren });
    if (showChildren) {
      rows.push(...collectVisibleRows(node.children, depth + 1));
    }
  });
  return rows;
}

// --- Interactions ---
function toggleNode(nodeId) {
  expandState[nodeId] = !expandState[nodeId];
  render();
}

function expandAllNodes() {
  function walk(nodes) {
    nodes.forEach(node => {
      if (node.children) {
        expandState[node.nodeId] = true;
        walk(node.children);
      }
    });
  }
  walk(categoryTree);
  render();
}

function collapseAllNodes() {
  function walk(nodes) {
    nodes.forEach(node => {
      if (node.children) {
        expandState[node.nodeId] = false;
        walk(node.children);
      }
    });
  }
  walk(categoryTree);
  render();
}

function expandOneLevel() {
  let minDepth = Infinity;
  function findMinCollapsed(nodes, depth) {
    nodes.forEach(node => {
      if (node.children) {
        if (!expandState[node.nodeId]) {
          if (depth < minDepth) minDepth = depth;
        } else {
          findMinCollapsed(node.children, depth + 1);
        }
      }
    });
  }
  findMinCollapsed(categoryTree, 0);
  if (minDepth === Infinity) return;

  function expandAtDepth(nodes, depth) {
    nodes.forEach(node => {
      if (node.children) {
        if (!expandState[node.nodeId] && depth === minDepth) {
          expandState[node.nodeId] = true;
        } else if (expandState[node.nodeId]) {
          expandAtDepth(node.children, depth + 1);
        }
      }
    });
  }
  expandAtDepth(categoryTree, 0);
  render();
}

function collapseOneLevel() {
  let maxDepth = -1;
  function findMaxExpanded(nodes, depth) {
    nodes.forEach(node => {
      if (node.children && expandState[node.nodeId]) {
        const hasExpandedChild = node.children.some(c => c.children && expandState[c.nodeId]);
        if (!hasExpandedChild) {
          if (depth > maxDepth) maxDepth = depth;
        } else {
          findMaxExpanded(node.children, depth + 1);
        }
      }
    });
  }
  findMaxExpanded(categoryTree, 0);
  if (maxDepth === -1) return;

  function collapseAtDepth(nodes, depth) {
    nodes.forEach(node => {
      if (node.children && expandState[node.nodeId]) {
        if (depth === maxDepth) {
          expandState[node.nodeId] = false;
        } else {
          collapseAtDepth(node.children, depth + 1);
        }
      }
    });
  }
  collapseAtDepth(categoryTree, 0);
  render();
}

// Track which top-level category a node belongs to
function findTopLevelIndex(node) {
  for (let i = 0; i < categoryTree.length; i++) {
    if (containsNode(categoryTree[i], node)) return i;
  }
  return 0;
}
function containsNode(root, target) {
  if (root === target) return true;
  if (root.children) return root.children.some(c => containsNode(c, target));
  return false;
}

// --- Render ---
function render() {
  const headerRow = document.getElementById('header-row');
  headerRow.innerHTML = '<th>Category</th>' +
    months.map(m => '<th>' + m + '</th>').join('') +
    '<th>Sum</th><th>Average</th>';

  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';

  const visibleRows = collectVisibleRows(categoryTree, 0);

  visibleRows.forEach(({ node, depth, hasChildren, showChildren }) => {
    const tr = document.createElement('tr');
    tr.className = 'depth-' + Math.min(depth, 3);

    // Apply accent color for depth-0 rows
    if (depth === 0) {
      const topIdx = categoryTree.indexOf(node);
      const accent = ACCENT_COLORS[topIdx % ACCENT_COLORS.length];
      tr.style.setProperty('--accent-color', accent);
    }

    const catTd = document.createElement('td');
    const catContent = document.createElement('div');
    catContent.className = 'cat-content';

    const indent = document.createElement('span');
    indent.className = 'indent';
    indent.style.width = (depth * 16) + 'px';
    catContent.appendChild(indent);

    if (hasChildren) {
      catTd.className = 'cat-cell-parent';
      const chevron = document.createElement('span');
      chevron.className = 'chevron' + (showChildren ? ' open' : '');
      chevron.textContent = '\u25B6';
      catContent.appendChild(chevron);
      catTd.onclick = () => toggleNode(node.nodeId);
    } else {
      const noChev = document.createElement('span');
      noChev.className = 'no-chevron';
      catContent.appendChild(noChev);
    }

    const nameSpan = document.createElement('span');
    nameSpan.textContent = node.name;
    catContent.appendChild(nameSpan);

    catTd.appendChild(catContent);
    tr.appendChild(catTd);

    months.forEach(m => {
      const td = document.createElement('td');
      const val = node.amounts[m] || 0;
      td.textContent = formatNum(val);
      const color = calculateCellColor(val, node.avg);
      if (color !== NEUTRAL_COLOR) {
        td.style.backgroundColor = color;
      }
      tr.appendChild(td);
    });

    const sumTd = document.createElement('td');
    sumTd.textContent = formatNum(node.sum);
    sumTd.style.fontWeight = '600';
    tr.appendChild(sumTd);
    const avgTd = document.createElement('td');
    avgTd.textContent = formatNum(node.avg);
    tr.appendChild(avgTd);

    tbody.appendChild(tr);
  });

  // Grand total row
  const grandTotals = {};
  months.forEach(m => grandTotals[m] = 0);
  categoryTree.forEach(node => months.forEach(m => { grandTotals[m] += node.amounts[m] || 0; }));
  const grandSum = months.reduce((s, m) => s + grandTotals[m], 0);
  const grandAvg = Math.round(grandSum / months.length);

  const sumTr = document.createElement('tr');
  sumTr.className = 'sum-row';
  const st = document.createElement('td');
  st.textContent = 'Total';
  sumTr.appendChild(st);
  months.forEach(m => {
    const td = document.createElement('td');
    td.textContent = formatNum(grandTotals[m]);
    sumTr.appendChild(td);
  });
  const gsTd = document.createElement('td');
  gsTd.textContent = formatNum(grandSum);
  sumTr.appendChild(gsTd);
  const gaTd = document.createElement('td');
  gaTd.textContent = formatNum(grandAvg);
  sumTr.appendChild(gaTd);
  tbody.appendChild(sumTr);
}

render();
</script>
</body>
</html>
